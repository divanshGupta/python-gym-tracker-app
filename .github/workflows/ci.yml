name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]  # [main, ___] run on main and feature branches
  pull_request:
    branches: [main]        # run on PRs targeting main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.5.0"  # your local version

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.6.0"  # check with: pnpm --version

      - name: Install dependencies
        run: pnpm install  # what command installs all deps in a pnpm monorepo?

      - name: Run tests
        run: pnpm test  # what script runs all tests?